<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
          <a-assets>
        <img id="my-image" src="media/landscape.jpg">
        <img id="img-top" src="media/sky.jpg">
        <img id="img-bottom" src="media/ground.jpg">

      </a-assets>
      <a-image src="#my-image" position="0 2 -5" width="14" height="8"></a-image>
      <a-image src="#my-image" position="0 2 5" rotation="0 180 0" width="14" height="8"></a-image>
      <a-image src="#my-image" position="-5 2 0" rotation="0 90 0" width="14" height="8"></a-image>
      <a-image src="#my-image" position="5 2 0" rotation="0 -90 0" width="14" height="8"></a-image>
      <a-image src="#img-top" position="0 6 0" rotation="-90 0 0" width="14" height="14"></a-image>
      <a-image src="#img-bottom" position="0 -3 0" rotation="90 0 0" width="14" height="14"></a-image>
      <a-sphere src="media/earth.jpeg" position="0 1 -3" radius=".25"></a-sphere>
    </a-scene>
  </body>
</html>
