<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
          <a-assets>
        <img id="my-image" src="media/landscape.jpg">

      </a-assets>
      <a-image src="#my-image" position="0 2 -5" width="14" height="8"></a-image>
      <a-image src="#my-image" position="0 2 5" rotation="0 180 0" width="14" height="8"></a-image>
      <a-image src="#my-image" position="-5 2 0" rotation="0 90 0" width="14" height="8"></a-image>
      <a-image src="#my-image" position="5 2 0" rotation="0 -90 0" width="14" height="8"></a-image>
      <a-box src="media/meadow.jpeg" position="-1 0.5 -3" rotation="0 45 0"></a-box>


  <!--<a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>-->
      <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
      <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <a-sky color="#ECECEC"></a-sky>
    </a-scene>
  </body>
</html>
